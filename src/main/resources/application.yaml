spring:
  application:
    name: planr-server

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    pool:
      enabled: true
      max-size: ${DB_POOL_MAX_SIZE:5}
      initial-size: ${DB_POOL_INITIAL_SIZE:1}
      max-idle-time: ${DB_POOL_MAX_IDLE_TIME:10m}
      validation-query: SELECT 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3s
      lettuce:
        pool:
          enabled: true
          max-active: 4
          max-idle: 2
          min-idle: 0
          max-wait: 1s
        shutdown-timeout: 100ms

  rabbitmq:
    host: ${RABBITMQ_DEFAULT_HOST}
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}
    virtual-host: ${RABBITMQ_DEFAULT_VIRTUAL_HOST}

  springdoc:
    api-docs:
      enabled: false
    swagger-ui:
      enabled: false
  web:
    error:
      include-exception: false
      include-message: always
      include-binding-errors: always
      include-stacktrace: never

server:
  port: ${SERVER_PORT:8080}

  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1KB

  shutdown: graceful

  netty:
    io-threads: 1

security:
  jwt: ${JWT_SECRET}

telegram:
  bot:
    token: ${TG_BOT_TOKEN}

vk:
  app:
    client-secret: ${VK_APP_CLIENT_SECRET}

---
spring:
  config:
    activate:
      on-profile: dev
  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true