# ============================================
# MEMORY SETTINGS
# Tuned for 1 GB RAM server.
# PostgreSQL target: ~256 MB resident.
# Rule: shared_buffers = 25% of RAM
# ============================================

shared_buffers = 256MB

# OS cache estimate (RAM - shared_buffers - OS - other services)
effective_cache_size = 512MB

# Per-sort/hash operation. Low value prevents runaway usage on complex queries.
work_mem = 2MB

maintenance_work_mem = 32MB

wal_buffers = 8MB


# ============================================
# WAL & CHECKPOINTS
# ============================================

checkpoint_completion_target = 0.9

# Smaller WAL size = less disk usage on 15 GB disk
max_wal_size = 512MB
min_wal_size = 128MB

wal_compression = on


# ============================================
# AUTOVACUUM
# Reduced workers to save memory
# ============================================

autovacuum = on
autovacuum_max_workers = 2

autovacuum_naptime = 30s

autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

autovacuum_vacuum_cost_limit = 400


# ============================================
# QUERY PLANNER
# SSD assumed (random_page_cost=1.1 is correct for SSD/NVMe)
# ============================================

random_page_cost = 1.1
effective_io_concurrency = 100


# ============================================
# CONNECTIONS
# R2DBC pool max=10, RabbitMQ ~2, headroom = 20 total is plenty
# ============================================

max_connections = 30

listen_addresses = '*'


# ============================================
# WRITE OPTIMIZATION
# synchronous_commit=off gives ~3x write throughput with tiny data-loss
# risk (last ~100ms of commits on crash). Acceptable for this app.
# ============================================

synchronous_commit = off

wal_level = minimal
max_wal_senders = 0

wal_sync_method = fdatasync