# ============================================
# MEMORY MANAGEMENT
# On 1 GB server: allow RabbitMQ ~150 MB (0.15 of total)
# ============================================

vm_memory_high_watermark.relative = 0.15

vm_memory_high_watermark_paging_ratio = 0.75

# ============================================
# DISK MANAGEMENT
# 15 GB disk — keep 1 GB free minimum
# ============================================

disk_free_limit.absolute = 1GB


# ============================================
# NETWORK & CONNECTIONS
# ============================================

listeners.tcp.default = 5672

management.tcp.port = 15672
management.tcp.ip = 127.0.0.1

tcp_listen_options.backlog = 128
tcp_listen_options.nodelay = true
tcp_listen_options.keepalive = true

# Reduce max channels per connection (default 2047 is wasteful)
channel_max = 64

heartbeat = 60


# ============================================
# SECURITY
# ============================================

loopback_users.guest = true


# ============================================
# LOGGING — warnings only to save I/O
# ============================================

log.console = true
log.console.level = warning

log.file = false